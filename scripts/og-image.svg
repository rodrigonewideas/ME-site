<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" font-family="Inter, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0A2C5C"/>
      <stop offset="1" stop-color="#1B9864"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- marca grande de fundo (eco do conceito 'o que falta') -->
  <g transform="translate(820,150) scale(11)" opacity="0.10">
    <rect x="11" y="5" width="16" height="20" rx="3" fill="none" stroke="#ffffff" stroke-width="2"/>
    <rect x="5" y="8" width="16" height="20" rx="3" fill="none" stroke="#ffffff" stroke-width="2"/>
    <line x1="9" y1="15" x2="17" y2="15" stroke="#ffffff" stroke-width="2" stroke-linecap="round"/>
    <line x1="9" y1="19" x2="17" y2="19" stroke="#ffffff" stroke-width="2" stroke-linecap="round"/>
    <line x1="9" y1="23" x2="17" y2="23" stroke="#4ADE9A" stroke-width="2" stroke-linecap="round" stroke-dasharray="0.1 3.4"/>
  </g>

  <!-- lockup topo: marca + wordmark -->
  <g transform="translate(80,72)">
    <g transform="scale(1.7)">
      <rect x="11" y="5" width="16" height="20" rx="3" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.4"/>
      <rect x="5" y="8" width="16" height="20" rx="3" fill="#0A2C5C" stroke="#ffffff" stroke-width="2"/>
      <line x1="9" y1="15" x2="17" y2="15" stroke="#ffffff" stroke-width="2" stroke-linecap="round"/>
      <line x1="9" y1="19" x2="17" y2="19" stroke="#ffffff" stroke-width="2" stroke-linecap="round"/>
      <line x1="9" y1="23" x2="17" y2="23" stroke="#4ADE9A" stroke-width="2" stroke-linecap="round" stroke-dasharray="0.1 3.4"/>
    </g>
    <text x="66" y="38" font-size="30" font-weight="700" fill="#ffffff">Malote Eletrônico <tspan fill="#4ADE9A">IA</tspan></text>
  </g>

  <!-- titulo (a tese) -->
  <text x="80" y="320" font-size="72" font-weight="800" fill="#ffffff" letter-spacing="-2">Entenda o acervo inteiro.</text>
  <text x="80" y="404" font-size="72" font-weight="800" fill="#ffffff" letter-spacing="-2">Inclusive <tspan fill="#4ADE9A">o que falta</tspan>.</text>

  <!-- subtitulo -->
  <text x="80" y="476" font-size="28" font-weight="400" fill="#CBD8E6">Classifica cada documento, identifica o dono e aponta o que falta.</text>

  <!-- dominio -->
  <text x="80" y="566" font-size="26" font-weight="600" fill="#8FA6BE">maloteeletronico.com.br</text>
</svg>
