# Site institucional Malote — INTRANET com HTTPS self-signed.
# Ponte de criptografia ate publicar em www.maloteeletronico.com.br com Let's Encrypt.
# Ativo em 192.168.0.212 (porta 80 -> 443). Cert self-signed em /etc/ssl/malote-site/.
#
# Para PUBLICAR (cert confiavel, sem aviso no navegador):
#   1. Apontar DNS A/AAAA de www.maloteeletronico.com.br e maloteeletronico.com.br p/ o IP publico do servidor.
#   2. Abrir 80/443 no firewall/roteador para o servidor.
#   3. Trocar este vhost pelo infra/nginx-malote-site.conf (server_name dos dominios) e rodar:
#        sudo certbot --nginx -d maloteeletronico.com.br -d www.maloteeletronico.com.br
#      (o certbot substitui os caminhos ssl_certificate pelos do Let's Encrypt e liga o redirect).
#   4. Ligar HSTS no header (descomentar a linha Strict-Transport-Security).

limit_req_zone $binary_remote_addr zone=lead:10m rate=10r/m;

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;
    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl http2 default_server;
    listen [::]:443 ssl http2 default_server;
    server_name _;

    ssl_certificate     /etc/ssl/malote-site/fullchain.pem;
    ssl_certificate_key /etc/ssl/malote-site/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    root /var/www/malote-site;
    index index.html;
    server_tokens off;

    # add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;  # so com cert confiavel (Let's Encrypt)
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self' 'sha256-5Bv7CKDCiSKc8Xj3k+gRclS7KTU7wjIhewv4oY3OBks=' 'sha256-51TWxHuIWfbbu9srmN/7KAAXVwIwcFAGIXo3fYoASgU=' 'sha256-Jz4XDAN4f076pEj8cOt8mEdISulquB3CBdxFvEpSSyc='; connect-src 'self'; font-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    location /_astro/ { expires 1y; add_header Cache-Control "public, immutable"; }

    location /api/ {
        limit_req zone=lead burst=5 nodelay;
        proxy_pass http://127.0.0.1:8020/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 32k;
    }

    location / { try_files $uri $uri/ $uri.html /404.html; }
}
