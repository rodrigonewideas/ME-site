# Site institucional Malote Eletronico IA — servidor web 192.168.0.212
# Estatico (Astro dist/) + proxy /api -> API de leads local (127.0.0.1:8020).
# Coloque em /etc/nginx/sites-available/ e crie symlink em sites-enabled.

# Rate limit dedicado para o endpoint de lead (alem do limite na API).
limit_req_zone $binary_remote_addr zone=lead:10m rate=10r/m;

server {
    listen 80;
    listen [::]:80;
    server_name maloteeletronico.com.br www.maloteeletronico.com.br;
    # certbot insere o redirect 301 -> https aqui ao emitir o certificado.
    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name maloteeletronico.com.br www.maloteeletronico.com.br;

    # TLS (certbot gerencia estes caminhos)
    ssl_certificate     /etc/letsencrypt/live/maloteeletronico.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/maloteeletronico.com.br/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    root /var/www/malote-site;
    index index.html;

    server_tokens off;

    # Cabecalhos de seguranca
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), camera=(), microphone=()" always;
    # CSP estrito (sem 'unsafe-inline' em script). Os hashes liberam os poucos scripts
    # inline (tema sem-flash + carregadores de ilha do Astro). REGENERAR apos build que
    # altere JS inline:  node scripts/csp-hashes.mjs  -> cole o script-src aqui.
    add_header Content-Security-Policy "default-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self' 'sha256-5Bv7CKDCiSKc8Xj3k+gRclS7KTU7wjIhewv4oY3OBks=' 'sha256-51TWxHuIWfbbu9srmN/7KAAXVwIwcFAGIXo3fYoASgU=' 'sha256-Jz4XDAN4f076pEj8cOt8mEdISulquB3CBdxFvEpSSyc='; connect-src 'self'; font-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;

    # Compressao
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Assets com hash -> cache longo e imutavel
    location /_astro/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # API de leads (proxy para o servico FastAPI local)
    location /api/ {
        limit_req zone=lead burst=5 nodelay;
        proxy_pass http://127.0.0.1:8020/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 32k;
    }

    # SPA/estatico: tenta arquivo, senao 404 do Astro
    location / {
        try_files $uri $uri/ $uri.html /404.html;
    }
}
